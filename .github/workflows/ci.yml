name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lint (ruff)
        # Fail fast on lint before the heavier install + test steps.
        # Keep this pin in sync with pyproject.toml [project.optional-dependencies].dev.
        run: |
          python -m pip install "ruff>=0.15,<0.16"
          python -m ruff check troTHU tests

      - name: Install dependencies
        run: python -m pip install -e .

      - name: Targeted smoke tests
        run: python -m unittest -v tests.test_app_shell tests.test_app_shell_dashboard tests.test_release_builder tests.test_release_checklist tests.test_readme_usage tests.test_cli tests.test_package_diagnostics

      - name: Release checklist smoke
        run: python -m troTHU.tron release-check --json

      - name: Release build dry run
        run: python -m troTHU.tron release-build --dry-run --json

      - name: Full unittest suite
        run: python -m unittest discover -v
